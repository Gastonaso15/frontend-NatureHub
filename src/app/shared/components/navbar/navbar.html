<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #1b4332;">
  <div class="container">
    @if (authService.estaLogueado()) {
      <button class="btn-sidebar-toggle" (click)="toggleSidebar.emit()" aria-label="Abrir menú lateral">☰</button>
    }
    <a class="navbar-brand fw-bold fs-5 position-absolute start-50 translate-middle-x mb-0" routerLink="/">🌿 NatureHub</a>

    @if (!authService.estaLogueado()) {
      <button class="navbar-toggler border-0" type="button"
        data-bs-toggle="collapse" data-bs-target="#mainNavbar"
        aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <div class="navbar-nav me-auto ms-lg-3 mt-2 mt-lg-0">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            Inicio
          </a>
          <a class="nav-link" routerLink="/categorias" routerLinkActive="active">
            Categorías
          </a>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap py-2 py-lg-0">
          <a routerLink="/auth/login" class="btn btn-outline-light btn-sm">Iniciar Sesión</a>
          <a routerLink="/auth/register" class="btn btn-success btn-sm">Registrarse</a>
        </div>
      </div>
    }
  </div>
</nav>
