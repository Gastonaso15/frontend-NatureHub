<app-navbar></app-navbar>

@if (authService.estaLogueado()) {
  <button class="menu-toggle" [class.hidden]="sidebarAbierta()" (click)="toggleSidebar()">
    ☰
  </button>
}

<div class="app-layout">
  @if (authService.estaLogueado()) {
    <app-sidebar [class.abierto]="sidebarAbierta()" (cerrar)="toggleSidebar()"></app-sidebar>
  }

  @if (authService.estaLogueado() && sidebarAbierta()) {
    <div class="sidebar-overlay" (click)="toggleSidebar()"></div>
  }

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>

<app-footer></app-footer>
